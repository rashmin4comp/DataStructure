<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SortVisualizer - Algorithm Tracer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sorting Algorithm Visualizer</h1>
            <p>Trace and understand how sorting works, step-by-step.</p>
        </header>

        <main>
            <section class="controls">
                <div class="control-group">
                    <label for="algorithm-select">Algorithm:</label>
                    <select id="algorithm-select">
                        <option value="bubble">Bubble Sort</option>
                        <option value="selection">Selection Sort</option>
                        <option value="insertion">Insertion Sort</option>
                        <option value="quick">Quick Sort</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="array-size">Size:</label>
                    <input type="range" id="array-size" min="5" max="50" value="20">
                    <span id="size-value">20</span>
                </div>

                <div class="control-group">
                    <label for="speed">Speed:</label>
                    <input type="range" id="speed" min="10" max="1000" step="10" value="200" dir="rtl">
                </div>

                <div class="actions">
                    <button id="generate-array" class="btn secondary">New Array</button>
                    <button id="start-sort" class="btn primary">Play</button>
                    <button id="next-step" class="btn secondary">Next Step</button>
                    <button id="reset-sort" class="btn danger">Reset</button>
                </div>
            </section>

            <div class="visualizer-container">
                <div id="array-container" class="array-container"></div>
            </div>

            <section class="log-section">
                <h3>Execution Trace</h3>
                <div id="log-container" class="log-container">
                    <div class="log-entry">Welcome! Select an algorithm and click 'Play' or 'Next Step'.</div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
